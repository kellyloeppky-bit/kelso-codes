services:
  - type: web
    name: kelsocodes
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: _site
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /admin
        destination: /admin/index.html
