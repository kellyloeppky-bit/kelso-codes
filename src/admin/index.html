<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <!-- Explicitly tell Decap CMS where to find config.yml -->
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Initialize Netlify Identity with explicit API URL for external domain -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init({
        APIUrl: "https://tangerine-starship-1f42af.netlify.app/.netlify/identity"
      });
    }
  </script>
</head>
<body>
  <!-- Include the script that builds the page and powers Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.1.2/dist/decap-cms.js"></script>

  <!-- Netlify Identity redirect handler -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
