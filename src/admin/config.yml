backend:
  name: github
  repo: kellyloeppky-bit/kelso-codes
  branch: main
publish_mode: editorial_workflow
media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "journal"
    label: "Journal Entries"
    folder: "src/journal"
    create: true
    slug: "{{year}}-{{month}}-entry-{{fields.entryNumber}}"
    fields:
      - {label: "Draft", name: "draft", widget: "boolean", default: true, hint: "Toggle off when ready to publish"}
      - {label: "Entry Number", name: "entryNumber", widget: "number", value_type: "int"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Date Display", name: "dateDisplay", widget: "string", hint: "e.g., 'March 2026'"}
      - {label: "Subtitle", name: "subtitle", widget: "string", hint: "e.g., 'Six months in'"}
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Use {% lesson \"Title\" %}content{% endlesson %} for lesson blocks"
        default: |
          <!-- Use this format for each lesson point:

          {% lesson "01. Your Title Here" %}
          Your paragraph content goes here. This keeps the visual styling consistent.
          {% endlesson %}

          Example:

          {% lesson "01. Start with research" %}
          Understanding the problem deeply is more valuable than jumping straight to code. Take time to explore before building.
          {% endlesson %}

          -->
      - {label: "Tags", name: "tags", widget: "list", default: []}
      - {label: "Acknowledgments", name: "acknowledgments", widget: "text", required: false}
  - name: "quizes"
    label: "Weekly Quizzes"
    folder: "src/quizes"
    create: true
    slug: "{{year}}-{{month}}-quiz-{{fields.quizNumber}}"
    fields:
      - {label: "Draft", name: "draft", widget: "boolean", default: true, hint: "Toggle off when ready to publish"}
      - {label: "Quiz Number", name: "quizNumber", widget: "number", value_type: "int"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Date Display", name: "dateDisplay", widget: "string", hint: "e.g., 'April 11, 2026'"}
      - {label: "Week Range", name: "weekRange", widget: "string", hint: "e.g., 'April 7–11, 2026'"}
      - {label: "Score", name: "score", widget: "number", value_type: "int"}
      - {label: "Total Questions", name: "totalQuestions", widget: "number", value_type: "int"}
      - {label: "Tags", name: "tags", widget: "list", default: ["#WeeklyQuiz", "#LearnWithMe"]}
      - {label: "Body", name: "body", widget: "markdown", hint: "Use Q&A format with ### for questions"}
